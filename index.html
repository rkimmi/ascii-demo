<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ASCII DEMO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="dropZone">
        <canvas id="canvas1"></canvas>
        <div id="dropHint">Drop an image here, or click to browse</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden />
      <div class="controls column">
        <div class="row w-full space-between">
          <label for="cellSize" id="cellSizeLabel"></label>
          <input
            type="range"
            id="cellSize"
            name="cellSize"
            min="1"
            max="20"
            value="5"
          />
        </div>
        <div class="imgControls column space-between">
          <div class="row colorControls">
            <span class="switchLabel" id="labelOriginal">Original color</span>
            <label class="switch" for="colorToggle">
              <input type="checkbox" id="colorToggle" />
              <span class="slider"></span>
            </label>
            <span class="switchLabel" id="labelSolid">Solid color</span>

            <input type="color" id="colorPicker" name="colorPicker" />
          </div>

          <div class="charControls column">
            <label id="charControlsLabel">Characters (light → dark)</label>
            <div id="charInputs" class="row"></div>
          </div>

          <button id="saveBtn" type="button">Save image</button>
        </div>
      </div>
    </div>
    <script src="ascii-core.js"></script>
    <script src="script.js"></script>
  </body>
</html>
